name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake svgs
        uses: Platane/snk@v3
        with:
          github_user_name: Alexhieuvuong
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=1a1b27&color_dots[0]=ebedf0&color_dots[1]=9be9a8&color_dots[2]=40c463&color_dots[3]=30a14e&color_dots[4]=216e39
            dist/github-contribution-grid-snake-dark.svg?color_snake=7dcfff&color_dots[0]=1a1b27&color_dots[1]=0d3742&color_dots[2]=0d5978&color_dots[3]=147eb3&color_dots[4]=7dcfff

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
